name: Build & Publish Docker Image to Docker Hub (Release)

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  
concurrency:
  group: dockerhub-release-${{ github.ref }}
  cancel-in-progress: true

env:
  # Change "ninjaone-mcp" to whatever you want the Docker Hub repo name to be
  IMAGE_NAME: ${{ vars.DOCKERHUB_USERNAME }}/ninjaone-mcp

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Optional (but recommended) if you want multi-arch images
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login to Docker Hub with a token (recommended)
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}


      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true

          # If you do NOT want multi-arch, change to: platforms: linux/amd64
          platforms: linux/amd64

          tags: |
            ${{ env.IMAGE_NAME }}:latest

          # Only push :latest for stable releases by using a build arg gate:
          # We'll keep it simple: push all tags, but you can remove latest line above
          # and use conditional tagging (see below).
          #
          # Speed up rebuilds (GitHub Actions cache)
          cache-from: type=gha
          cache-to: type=gha,mode=max
